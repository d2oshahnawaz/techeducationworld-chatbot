<!DOCTYPE html>
<html>
<head>
    <title>Tech Education World Chatbot</title>

    <style>
        body { 
            font-family: Arial; 
            background: #1e1e1e; 
            color: white; 
            text-align: center; 
        }

        #chat { 
            height: 400px; 
            overflow-y: auto; 
            border: 1px solid #444; 
            margin: 20px; 
            padding: 10px; 
            border-radius: 10px;
            background: #2b2b2b;
            text-align: left;
        }

        button { 
            padding: 10px; 
            margin: 5px; 
            cursor: pointer;
            border-radius: 5px;
            border: none;
            background: #00adb5;
            color: white;
        }

        input { 
            padding: 10px; 
            width: 60%; 
            background: #333; 
            color: white; 
            border: none;
            border-radius: 5px;
        }

        .user { 
            color: #00ffcc; 
            font-weight: bold; 
            margin: 5px;
        }

        .bot { 
            color: #ffffff; 
            margin: 5px;
        }
    </style>
</head>

<body>

<h2>🤖 Tech Education World Chatbot</h2>
<p>Learn • Intern • Grow 🚀</p>

<div id="chat"></div>

<input id="msg" placeholder="Ask about courses, internships, webinars...">
<button onclick="send()">Send 🚀</button>
<button onclick="startVoice()">🎤 Speak</button>

<script>
function appendMessage(content, className) {
    let chat = document.getElementById("chat");

    chat.innerHTML += "<p class='" + className + "'>" + content + "</p>";

    // 🔥 Auto scroll fix
    chat.scrollTop = chat.scrollHeight;
}

function sendMessage(message) {

    appendMessage("🧑 " + message, "user");

    fetch("/get", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {

        // ✅ remove unwanted prefix
        let cleanReply = data.reply.replace("Tech Education World:", "");

        appendMessage("🤖 " + cleanReply, "bot");

        // 🔊 Voice Output
        let speech = new SpeechSynthesisUtterance(cleanReply);
        speech.lang = "en-IN";
        speech.rate = 1;
        speech.pitch = 1;

        let voices = speechSynthesis.getVoices();
        if (voices.length > 1) speech.voice = voices[1];

        speechSynthesis.speak(speech);
    });
}

function send() {
    let msg = document.getElementById("msg").value;

    if(msg.trim() === "") return;

    sendMessage(msg);
    document.getElementById("msg").value = "";
}

// 🎤 Voice Input
function startVoice() {

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("Voice not supported. Use Chrome.");
        return;
    }

    speechSynthesis.cancel();

    let recognition = new SpeechRecognition();

    recognition.lang = "en-IN";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.start();

    recognition.onstart = function () {
        console.log("🎤 Listening...");
    };

    recognition.onresult = function (event) {
        let text = event.results[0][0].transcript;

        document.getElementById("msg").value = text;
        sendMessage(text);
    };

    recognition.onerror = function (event) {
        alert("Mic error: " + event.error);
    };
}
</script>

</body>
</html>
